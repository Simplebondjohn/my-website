<main>
    <h1>Welcome to the Contact Form</h1>
    <br>

    <form class="contact-form">
        <div>
        <label for="fname">First Name</label>
        <input type="text" id="fname" name="firstname" placeholder="Your name..">
        </div>
        <div>
        <label for="flname">Last Name</label>
        <input type="text" id="flname" name="lastname" placeholder="Your last name..">
        </div>
        <div>
        <label for="femail">Email</label>
        <input type="text" id="femail" name="email" placeholder="Your email..">
        </div>
        <div>
        <label for ="fmessage">Message/Request</label>
        <textarea  id="fmessage" name="message"  placeholder="Enter your request"></textarea>
        </div>
        <div>
        <label for="fSubject">Select a Reason:</label>
        <input type="radio" name="fsubject" id="fpreorder" value="premake" checked> Pre-order Food
        <input type="radio" name="fsubject" id="ffoodidea" value="foodidea"> Food Suggestion Idea
        </div>
        <div id="preorder-fields">
            <label for="orderdate">Select a Date:</label>
            <input type="date" id="orderdate" name="orderdate">

            <label for="ordertime">Select a Time:</label>
            <input type="time" id="ordertime" name="ordertime">
        </div>
        <div class="button">
        <button type="button" id="submit">Submit</button>
        </div>
        <div class="button">
            <button id="reset">Reset</button>
        </div>

    </form>
</main>
